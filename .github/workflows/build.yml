name: build

on:
  push:
    branches: [main, next]
  pull_request:
    types: [opened, synchronize, reopened]

# Supersede in-progress runs for the same ref, but never cancel release
# runs on main/next - only collapse redundant PR runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Enabled permissions on GITHUB_TOKEN
permissions:
  # To be able to push to the repo
  contents: write
  # To update the pr description with canary info
  pull-requests: write
  # For pr-check to create a status
  statuses: write
  # Needed to create PR statuses/checks
  checks: write
  # To post comments on PRs
  issues: write
  # OIDC token for npm Trusted Publishing (token-less publish + provenance)
  id-token: write
  # To publish to GitHub Packages (secondary registry)
  packages: write

env:
  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
  PROTECTED_BRANCH_REVIEWER_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  # Run install in one step so the pnpm store is warmed for other jobs
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup

  check:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
        with:
          # full history + tags for auto's versioning
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - run: pnpm check

  release:
    runs-on: ubuntu-latest
    needs: check
    if: "!contains(github.event.head_commit.message, 'ci skip') && !contains(github.event.head_commit.message, 'skip ci')"
    steps:
      - uses: actions/checkout@v6
        with:
          # full history + tags for auto's versioning
          fetch-depth: 0
      - uses: ./.github/actions/setup
      # Primary: npm via OIDC Trusted Publishing (token-less, with provenance).
      # auto bumps the version, writes the changelog, commits, tags, and publishes to npm.
      - name: Create Release (npm)
        run: pnpm auto shipit
        if: ${{ env.GITHUB_TOKEN != '' }}
      # Secondary: mirror the just-published version to GitHub Packages using GH_TOKEN
      # (GitHub Packages does not support npm OIDC trusted publishing).
      - name: Publish to GitHub Packages
        if: ${{ github.ref == 'refs/heads/main' && env.GITHUB_TOKEN != '' }}
        run: |
          echo "//npm.pkg.github.com/:_authToken=${GITHUB_TOKEN}" > "$RUNNER_TEMP/.npmrc"
          npm publish --ignore-scripts \
            --registry=https://npm.pkg.github.com \
            --userconfig "$RUNNER_TEMP/.npmrc"
